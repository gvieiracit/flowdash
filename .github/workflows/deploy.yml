name: Deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.claude/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
    paths-ignore:
      - '.claude/**'
      - '*.md'
      - 'docs/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gvieiracit/flowdash
  RESOURCE_GROUP: ASOS_AI
  ENVIRONMENT: cae-flowdash
  PROD_APP_NAME: ca-flowdash-prod

jobs:
  # ──────────────────────────────────────────────
  # Production: push to master
  # ──────────────────────────────────────────────
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ env.PROD_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          containerAppEnvironment: ${{ env.ENVIRONMENT }}
          targetPort: 5005
          ingress: external
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
          environmentVariables: >-
            authEnabled=true
            AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}
            standalone=true
            standaloneProtocol=${{ secrets.NEO4J_PROTOCOL }}
            standaloneHost=${{ secrets.NEO4J_HOST }}
            standalonePort=${{ secrets.NEO4J_PORT }}
            standaloneDatabase=${{ secrets.NEO4J_DATABASE }}
            standaloneUsername=${{ secrets.NEO4J_USERNAME }}
            standalonePassword=${{ secrets.NEO4J_PASSWORD }}
            standaloneDashboardName="${{ vars.DASHBOARD_NAME || 'My Dashboard' }}"
            standaloneDashboardDatabase=${{ secrets.NEO4J_DATABASE }}
            standaloneAllowLoad=true
            standalonePasswordWarningHidden=true
            customHeader=${{ secrets.NEO4J_CUSTOMHEADER }}

      - name: Set min replicas to 1
        run: |
          az containerapp update \
            --name ${{ env.PROD_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --min-replicas 1

  # ──────────────────────────────────────────────
  # PR Preview: opened / updated
  # ──────────────────────────────────────────────
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy preview Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-flowdash-pr-${{ github.event.pull_request.number }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}-${{ steps.sha.outputs.short }}
          containerAppEnvironment: ${{ env.ENVIRONMENT }}
          targetPort: 5005
          ingress: external
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
          environmentVariables: >-
            authEnabled=true
            AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}
            standalone=true
            standaloneProtocol=${{ secrets.NEO4J_PROTOCOL }}
            standaloneHost=${{ secrets.NEO4J_HOST }}
            standalonePort=${{ secrets.NEO4J_PORT }}
            standaloneDatabase=${{ secrets.NEO4J_DATABASE }}
            standaloneUsername=${{ secrets.NEO4J_USERNAME }}
            standalonePassword=${{ secrets.NEO4J_PASSWORD }}
            standaloneDashboardName="${{ vars.DASHBOARD_NAME || 'My Dashboard' }}"
            standaloneDashboardDatabase=${{ secrets.NEO4J_DATABASE }}
            standaloneAllowLoad=true
            standalonePasswordWarningHidden=true
            customHeader=${{ secrets.NEO4J_CUSTOMHEADER }}

      - name: Set min replicas to 1
        run: |
          az containerapp update \
            --name ca-flowdash-pr-${{ github.event.pull_request.number }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --min-replicas 1

      - name: Get preview URL
        id: preview-url
        run: |
          FQDN=$(az containerapp show \
            --name ca-flowdash-pr-${{ github.event.pull_request.number }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview URL
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### Preview Deployment
            Preview is ready at: ${{ steps.preview-url.outputs.url }}
            Sign in with your **@ciandt.com** or **@asos.com** email.
            _Updated for commit ${{ github.sha }}_

  # ──────────────────────────────────────────────
  # Cleanup: PR closed
  # ──────────────────────────────────────────────
  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete preview Container App
        run: |
          az containerapp delete \
            --name ca-flowdash-pr-${{ github.event.pull_request.number }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes

      - name: Delete preview image from GHCR
        uses: actions/delete-package-versions@v5
        with:
          package-name: flowdash
          package-type: container
          min-versions-to-keep: 0
          delete-only-pre-release-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
