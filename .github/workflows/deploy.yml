name: Deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.claude/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
    paths-ignore:
      - '.claude/**'
      - '*.md'
      - 'docs/**'

env:
  ACR_NAME: acrflowdash
  ACR_LOGIN_SERVER: acrflowdash.azurecr.io
  RESOURCE_GROUP: ASOS_AI
  ENVIRONMENT: cae-flowdash
  PROD_APP_NAME: ca-flowdash-prod

jobs:
  # ──────────────────────────────────────────────
  # Production: push to master
  # ──────────────────────────────────────────────
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/flowdash:latest
            ${{ env.ACR_LOGIN_SERVER }}/flowdash:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get ACR credentials
        id: acr-creds
        run: |
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "password=$ACR_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ env.PROD_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/flowdash:sha-${{ steps.sha.outputs.short }}
          containerAppEnvironment: ${{ env.ENVIRONMENT }}
          targetPort: 5005
          ingress: external
          registryUrl: ${{ env.ACR_LOGIN_SERVER }}
          registryUsername: ${{ env.ACR_NAME }}
          registryPassword: ${{ steps.acr-creds.outputs.password }}
          environmentVariables: >-
            authEnabled=true
            AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}
            standalone=true
            standaloneProtocol=${{ secrets.NEO4J_PROTOCOL }}
            standaloneHost=${{ secrets.NEO4J_HOST }}
            standalonePort=${{ secrets.NEO4J_PORT }}
            standaloneDatabase=${{ secrets.NEO4J_DATABASE }}
            standaloneUsername=${{ secrets.NEO4J_USERNAME }}
            standalonePassword=${{ secrets.NEO4J_PASSWORD }}
            standaloneDashboardName="${{ vars.DASHBOARD_NAME || 'My Dashboard' }}"
            standaloneDashboardDatabase=${{ secrets.NEO4J_DATABASE }}
            standaloneAllowLoad=true
            standalonePasswordWarningHidden=true
            customHeader=${{ secrets.NEO4J_CUSTOMHEADER }}

      - name: Set min replicas to 1
        run: |
          az containerapp update \
            --name ${{ env.PROD_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --min-replicas 1

  # ──────────────────────────────────────────────
  # PR Preview: opened / updated
  # ──────────────────────────────────────────────
  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/flowdash:pr-${{ github.event.pull_request.number }}-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR credentials
        id: acr-creds
        run: |
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "password=$ACR_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Deploy preview Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ca-flowdash-pr-${{ github.event.pull_request.number }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/flowdash:pr-${{ github.event.pull_request.number }}-${{ steps.sha.outputs.short }}
          containerAppEnvironment: ${{ env.ENVIRONMENT }}
          targetPort: 5005
          ingress: external
          registryUrl: ${{ env.ACR_LOGIN_SERVER }}
          registryUsername: ${{ env.ACR_NAME }}
          registryPassword: ${{ steps.acr-creds.outputs.password }}
          environmentVariables: >-
            authEnabled=true
            AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}
            standalone=true
            standaloneProtocol=${{ secrets.NEO4J_PROTOCOL }}
            standaloneHost=${{ secrets.NEO4J_HOST }}
            standalonePort=${{ secrets.NEO4J_PORT }}
            standaloneDatabase=${{ secrets.NEO4J_DATABASE }}
            standaloneUsername=${{ secrets.NEO4J_USERNAME }}
            standalonePassword=${{ secrets.NEO4J_PASSWORD }}
            standaloneDashboardName="${{ vars.DASHBOARD_NAME || 'My Dashboard' }}"
            standaloneDashboardDatabase=${{ secrets.NEO4J_DATABASE }}
            standaloneAllowLoad=true
            standalonePasswordWarningHidden=true
            customHeader=${{ secrets.NEO4J_CUSTOMHEADER }}

      - name: Set min replicas to 1
        run: |
          az containerapp update \
            --name ca-flowdash-pr-${{ github.event.pull_request.number }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --min-replicas 1

      - name: Get preview URL
        id: preview-url
        run: |
          FQDN=$(az containerapp show \
            --name ca-flowdash-pr-${{ github.event.pull_request.number }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview URL
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### Preview Deployment
            Preview is ready at: ${{ steps.preview-url.outputs.url }}
            Sign in with your **@ciandt.com** or **@asos.com** email.
            _Updated for commit ${{ github.sha }}_

  # ──────────────────────────────────────────────
  # Cleanup: PR closed
  # ──────────────────────────────────────────────
  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete preview Container App
        run: |
          az containerapp delete \
            --name ca-flowdash-pr-${{ github.event.pull_request.number }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes

      - name: Delete preview image tags from ACR
        run: |
          for tag in $(az acr repository show-tags \
            --name ${{ env.ACR_NAME }} \
            --repository flowdash \
            --query "[?starts_with(@, 'pr-${{ github.event.pull_request.number }}-')]" \
            -o tsv 2>/dev/null); do
            az acr repository untag \
              --name ${{ env.ACR_NAME }} \
              --image "flowdash:$tag" 2>/dev/null || true
          done
        continue-on-error: true
